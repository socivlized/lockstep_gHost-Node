name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
        
      - name: Install N4.AI Engine Dependencies
        run: pip install numpy networkx fastapi uvicorn
        
      - name: Execute Sovereign Demo
        env:
          CI: true
        run: python "./gHost_Node_N4AI_NGNE_v1_5.py"